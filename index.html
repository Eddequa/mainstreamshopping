<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MainstreamShopping</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow-md p-4 flex justify-between">
    <h1 class="text-2xl font-bold">MainstreamShopping</h1>
    <div>
      <a href="#" class="mx-2">Home</a>
      <a href="#products" class="mx-2">Products</a>
      <a href="#contact" class="mx-2">Contact</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="text-center p-10 bg-blue-500 text-white">
    <h2 class="text-4xl font-bold mb-4">Shop Trending Products</h2>
    <p class="mb-6">Best deals on fashion, gadgets, and more</p>
    <button class="bg-white text-blue-500 px-6 py-2 rounded">Shop Now</button>
  </section>

  <!-- Products -->
  <section id="products" class="p-10">
    <h2 class="text-3xl font-bold mb-6 text-center">Featured Products</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Product Card -->
      <div class="bg-white p-4 rounded shadow">
        <img src="https://via.placeholder.com/300" class="mb-4">
        <h3 class="font-bold">Product 1</h3>
        <p>$25</p>
        <button class="bg-blue-500 text-white px-4 py-2 mt-2">Buy</button>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <img src="https://via.placeholder.com/300" class="mb-4">
        <h3 class="font-bold">Product 2</h3>
        <p>$40</p>
        <button class="bg-blue-500 text-white px-4 py-2 mt-2">Buy</button>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <img src="https://via.placeholder.com/300" class="mb-4">
        <h3 class="font-bold">Product 3</h3>
        <p>$60</p>
        <button class="bg-blue-500 text-white px-4 py-2 mt-2">Buy</button>
      </div>

    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="p-10 bg-gray-200 text-center">
    <h2 class="text-2xl font-bold mb-4">Contact Us</h2>
    <p>Email: support@mainstreamshopping.com</p>
  </section>

  <!-- Footer -->
  <footer class="bg-white p-4 text-center">
    <p>© 2026 MainstreamShopping. All rights reserved.</p>
  </footer>

</body>
</html>
